version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly, day: monday, time: "09:00", timezone: America/Sao_Paulo }
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch: { update-types: [minor, patch] }
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule: { interval: weekly, day: monday, time: "09:30", timezone: America/Sao_Paulo }
    open-pull-requests-limit: 5
    groups:
      rust-minor-patch: { update-types: [minor, patch] }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: monthly, day: monday, time: "10:00", timezone: America/Sao_Paulo }
    groups:
      actions: { patterns: ["*"] }
