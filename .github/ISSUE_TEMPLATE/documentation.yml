name: Documentation issue
description: Report unclear, missing, or incorrect documentation
title: "[Docs]: "
labels: ["documentation", "needs-triage"]
body:
  - type: input
    id: location
    attributes: { label: Page or file, placeholder: "README.md or a URL" }
    validations: { required: true }
  - type: textarea
    id: issue
    attributes: { label: "What is unclear or incorrect?" }
    validations: { required: true }
  - type: textarea
    id: suggestion
    attributes: { label: Suggested improvement }
  - type: input
    id: version
    attributes: { label: Relevant app version, description: Optional for general documentation. }
