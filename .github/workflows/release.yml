name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  OPENSPEC_TELEMETRY: "0"

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { fetch-depth: 0 }
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { bun-version: 1.3.13 }
      - run: bun install --frozen-lockfile
      - run: bun run check:version
      - run: bun run quality
      - name: Validate release tag shape
        run: printf '%s' "$GITHUB_REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'
      - name: Require tag at current protected-branch commit
        run: git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'

  build:
    name: Release build (${{ matrix.platform }})
    needs: validate
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux-x64, runner: ubuntu-24.04, target: x86_64-unknown-linux-gnu, bundles: "appimage,deb,rpm", expected: "appimage,deb,rpm" }
          - { platform: macos-arm64, runner: macos-15, target: aarch64-apple-darwin, bundles: "app,dmg", expected: "app,dmg" }
          - { platform: windows-x64, runner: windows-2025, target: x86_64-pc-windows-msvc, bundles: "nsis,msi", expected: "nsis,msi" }
          - { platform: windows-arm64, runner: windows-11-arm, target: aarch64-pc-windows-msvc, bundles: "nsis,msi", expected: "nsis,msi" }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { bun-version: 1.3.13 }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { workspaces: "src-tauri -> target" }
      - name: Install Linux libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libgtk-3-dev libasound2-dev patchelf libfuse2 file
      - run: rustup target add ${{ matrix.target }}
      - run: bun install --frozen-lockfile
      - run: cargo fetch --manifest-path src-tauri/Cargo.toml --locked --target ${{ matrix.target }}
      - name: Import optional Windows PFX
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) { Write-Host 'No Windows signing certificate configured for this RC.'; exit 0 }
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\certificate.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $cert = Import-PfxCertificate -FilePath "$env:RUNNER_TEMP\certificate.pfx" -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force)
          "WINDOWS_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          @{ bundle = @{ windows = @{ certificateThumbprint = $cert.Thumbprint; digestAlgorithm = 'sha256'; timestampUrl = 'http://timestamp.digicert.com' } } } | ConvertTo-Json -Depth 5 | Set-Content "$env:RUNNER_TEMP\signing.json"
      - name: Prepare optional Apple API key
        if: runner.os == 'macOS'
        env: { APPLE_API_KEY_CONTENT: "${{ secrets.APPLE_API_KEY }}" }
        run: |
          if [ -z "$APPLE_API_KEY_CONTENT" ]; then echo 'No Apple notarization key configured for this RC.'; exit 0; fi
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
      - name: Build bundles
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
        shell: bash
        run: |
          config=()
          if [ "${{ runner.os }}" = Windows ] && [ -n "${WINDOWS_THUMBPRINT:-}" ]; then config=(--config "$RUNNER_TEMP/signing.json"); fi
          bun run tauri build --target "${{ matrix.target }}" --bundles "${{ matrix.bundles }}" "${config[@]}"
      - name: Archive macOS app
        if: runner.os == 'macOS'
        run: |
          app=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name '*.app' -type d)
          test "$(printf '%s\n' "$app" | grep -c .)" -eq 1
          ditto -c -k --sequesterRsrc --keepParent "$app" "src-tauri/target/${{ matrix.target }}/release/bundle/LazyNevis_${GITHUB_REF_NAME#v}_macos-arm64_app.zip"
      - name: Normalize artifacts
        run: bun scripts/normalize-release-artifacts.mjs "src-tauri/target/${{ matrix.target }}/release/bundle" release-assets "${GITHUB_REF_NAME#v}" "${{ matrix.platform }}" "${{ matrix.expected }}"
        shell: bash
      - name: Verify stable macOS signature and notarization
        if: runner.os == 'macOS' && !contains(github.ref_name, '-rc.')
        run: |
          app=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name '*.app' -type d)
          codesign --verify --deep --strict "$app"
          codesign -dv --verbose=4 "$app" 2>&1 | grep -q '^Authority=Developer ID Application:'
          spctl --assess --type execute "$app"
          xcrun stapler validate release-assets/*.dmg
      - name: Verify stable Windows signatures
        if: runner.os == 'Windows' && !contains(github.ref_name, '-rc.')
        shell: pwsh
        run: Get-ChildItem release-assets | ForEach-Object { if ((Get-AuthenticodeSignature $_).Status -ne 'Valid') { throw "Unsigned stable artifact $($_.Name)" } }
      - name: Verify Linux packages
        if: runner.os == 'Linux'
        run: file release-assets/* && test -x release-assets/*.AppImage
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.platform }}
          path: release-assets/
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish release unit
    needs: build
    environment: release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { bun-version: 1.3.13 }
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with: { pattern: "release-*", path: release-assets, merge-multiple: true }
      - name: Add versioned installer scripts and icon
        run: |
          cp scripts/install.sh "release-assets/install-${GITHUB_REF_NAME#v}.sh"
          cp scripts/install.ps1 "release-assets/install-${GITHUB_REF_NAME#v}.ps1"
          cp scripts/install.sh release-assets/install.sh
          cp scripts/install.ps1 release-assets/install.ps1
          cp app-icon.png release-assets/app-icon.png
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: release-assets/LazyNevis_${{ github.ref_name }}_SBOM.cdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate final checksums and notes
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum | sed 's#  \./#  #' > "$RUNNER_TEMP/SHA256SUMS"
          mv "$RUNNER_TEMP/SHA256SUMS" SHA256SUMS
          cd ..
          bun scripts/release-notes.mjs "${GITHUB_REF_NAME#v}" release-notes.md
      - name: Attest release unit
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with: { subject-path: "release-assets/*" }
      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
          fail_on_unmatched_files: true
          files: release-assets/*
