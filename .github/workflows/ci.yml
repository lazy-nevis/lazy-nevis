name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  OPENSPEC_TELEMETRY: "0"

jobs:
  frontend:
    name: Frontend quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { bun-version: 1.3.13 }
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run build

  rust:
    name: Rust quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Linux libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libgtk-3-dev libasound2-dev patchelf
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { workspaces: "src-tauri -> target" }
      - run: cargo fetch --manifest-path src-tauri/Cargo.toml --locked
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml --locked

  repository-policy:
    name: Repository policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { bun-version: 1.3.13 }
      - run: bun install --frozen-lockfile
      - run: bun run quality:repository
      - run: sh scripts/audit-repository.sh
      - name: actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with: { scandir: scripts }

  powershell-policy:
    name: PowerShell policy
    runs-on: windows-2025
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: microsoft/psscriptanalyzer-action@6b2948b1944407914a58661c49941824d149734f # v1.1
        with:
          path: scripts
          recurse: true
          output: results.sarif

  dependency-policy:
    name: Dependency policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { bun-version: 1.3.13 }
      - run: bun install --frozen-lockfile
      - name: Bun audit (high severity blocks)
        run: bun audit --audit-level=high
      - name: RustSec audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with: { working-directory: src-tauri }
      - name: Cargo license and source policy
        uses: EmbarkStudios/cargo-deny-action@d8395c1c8c9df74d968a3bcbba5533e396ff43cf # v2.0.9
        with:
          command: check licenses sources
          manifest-path: src-tauri/Cargo.toml

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  smoke-build:
    name: Smoke build (${{ matrix.name }})
    needs: [frontend, rust, repository-policy]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64, runner: ubuntu-24.04, target: x86_64-unknown-linux-gnu, bundles: appimage,deb,rpm }
          - { name: macos-arm64, runner: macos-15, target: aarch64-apple-darwin, bundles: app,dmg }
          - { name: windows-x64, runner: windows-2025, target: x86_64-pc-windows-msvc, bundles: nsis,msi }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { bun-version: 1.3.13 }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { workspaces: "src-tauri -> target" }
      - name: Install Linux libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libgtk-3-dev libasound2-dev patchelf libfuse2 file
      - run: rustup target add ${{ matrix.target }}
      - run: bun install --frozen-lockfile
      - run: cargo fetch --manifest-path src-tauri/Cargo.toml --locked --target ${{ matrix.target }}
      - run: bun run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: smoke-${{ matrix.name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: error
          retention-days: 7
